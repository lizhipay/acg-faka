#{include file="../Common/Header.html"}
<div class="uc-main">
    <div class="uc-card">
        <div class="uc-card__body">
            #{include file="../Common/SecurityNav.html"}
            <form class="layui-form form-data">
                <div class="form-block">
                    <div>
                        <div class="form-header">旧密码</div>
                        <div class="form-body"><input type="password" name="old_password" autocomplete="off" class="layui-input" placeholder="请输入旧密码"></div>
                    </div>
                    <div>
                        <div class="form-header">新密码</div>
                        <div class="form-body"><input type="password" name="password" autocomplete="off" class="layui-input" placeholder="请输入新密码"></div>
                    </div>
                    <div>
                        <div class="form-header">确认新密码</div>
                        <div class="form-body"><input type="password" name="re_password" autocomplete="off" class="layui-input" placeholder="请再次输入新密码"></div>
                    </div>
                    <div style="margin-top:24px;">
                        <button type="button" class="uc-cta save-data"><span class="material-icons-outlined">save</span>保存修改</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

#{ready("/assets/user/controller/security/password.js")}
#{include file="../Common/Footer.html"}
