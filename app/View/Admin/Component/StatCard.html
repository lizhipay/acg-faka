<!--begin::StatCard (Material icon+number) — params: accent, icon, label, value, vclass, itemClass-->
<div class="md-stat-grid__item #{$itemClass|default:''}">
    <div class="md-stat md-stat--#{$accent|default:'primary'}">
        <div class="md-stat__icon"><i class="fa-duotone fa-regular #{$icon|default:'fa-chart-simple'}"></i></div>
        <div class="md-stat__body">
            <div class="md-stat__label">#{$label|default:''}</div>
            <div class="md-stat__value #{$vclass|default:''}">#{$value|default:''}</div>
        </div>
    </div>
</div>
<!--end::StatCard-->
