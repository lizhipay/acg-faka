#{include file="../Header.html"}

<!--begin::Content-->
<div class="content d-flex flex-column flex-column-fluid" id="kt_content">
  <!--begin::Toolbar-->
  #{include file="../Toolbar.html"}
  <!--end::Toolbar-->
  <!--begin::Post-->
  <div class="post d-flex flex-column-fluid" id="kt_post">
    <!--begin::Container-->
    <div id="kt_content_container" class="container-xxl md-settings">
      <!--begin::Basic info-->
      <div class="card mb-5 mb-xl-10">
        <!--begin::Content-->
        <div id="kt_account_profile_details" class="collapse show">
          <!--begin::Form-->
          <form id="data-form" class="form">
            <!--begin::Card body-->
            <div class="card-body p-9">
              <!--begin::Input group-->
              <div class="row mb-6">
                <!--begin::Label-->
                <label class="col-lg-4 col-form-label fw-bold fs-6">头像</label>
                <!--end::Label-->
                <!--begin::Col-->
                <div class="col-lg-8">
                  <!--begin::Image input-->
                  <div class="image-input image-input-outline w-125px h-125px admin-mobile-image-input admin-mobile-image-input--avatar" data-kt-image-input="true"
                       style="background-image: url(/assets/admin/images/setting/blank.png)">
                    <!--begin::Preview existing logo-->
                    <div class="image-input-wrapper w-125px h-125px"
                         style="background-image: url('#{if $user.avatar}#{$user.avatar|escape:'html'}#{else}/favicon.ico#{/if}')"></div>
                    <!--end::Preview existing logo-->
                    <!--begin::Label-->
                    <label class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow"
                           data-kt-image-input-action="change" data-bs-toggle="tooltip"
                           title="更换头像" aria-label="更换头像">
                      <i class="fa-duotone fa-regular fa-pen"></i>
                      <!--begin::Inputs-->
                      <input type="file" class="upload-logo"
                             accept=".png, .jpg, .jpeg, .ico"/>
                      <input type="hidden" name="avatar" value="#{$user.avatar|escape:'html'}"/>
                      <!--end::Inputs-->
                    </label>
                    <!--end::Label-->
                    <!--begin::Cancel-->
                    <span class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow"
                          data-kt-image-input-action="cancel" data-bs-toggle="tooltip"
                          title="取消更换头像" aria-label="取消更换头像">
																<i class="fa-duotone fa-regular fa-xmark"></i>
															</span>
                    <!--end::Cancel-->
                  </div>
                  <!--end::Image input-->
                  <!--begin::Hint-->
                  <div class="form-text">支持文件格式: png, jpg, jpeg, ico.</div>
                  <!--end::Hint-->
                </div>
                <!--end::Col-->
              </div>
              <!--end::Input group-->

              <!--begin::Input group-->
              <div class="row mb-6">
                <!--begin::Label-->
                <label class="col-lg-4 col-form-label required fw-bold fs-6">昵称</label>
                <!--end::Label-->
                <!--begin::Col-->
                <div class="col-lg-8 fv-row">
                  <input type="text" name="nickname"
                         class="form-control form-control-lg form-control-solid"
                         autocomplete="nickname" maxlength="32"
                         placeholder="昵称" value="#{$user.nickname|escape:'html'}"/>
                </div>
                <!--end::Col-->
              </div>
              <!--end::Input group-->

              <!--begin::Input group-->
              <div class="row mb-6">
                <!--begin::Label-->
                <label class="col-lg-4 col-form-label  fw-bold fs-6">旧密码</label>
                <!--end::Label-->
                <!--begin::Col-->
                <div class="col-lg-8 fv-row">
                  <input type="password" name="old_password"
                         class="form-control form-control-lg form-control-solid"
                         placeholder="不修改请留空" value=""/>
                </div>
                <!--end::Col-->
              </div>
              <!--end::Input group-->


              <!--begin::Input group-->
              <div class="row mb-6">
                <!--begin::Label-->
                <label class="col-lg-4 col-form-label  fw-bold fs-6">新密码</label>
                <!--end::Label-->
                <!--begin::Col-->
                <div class="col-lg-8 fv-row">
                  <input type="password" name="password"
                         class="form-control form-control-lg form-control-solid"
                         maxlength="256"
                         placeholder="不修改请留空" value=""/>
                </div>
                <!--end::Col-->
              </div>
              <!--end::Input group-->

              <!--begin::Input group-->
              <div class="row mb-6">
                <!--begin::Label-->
                <label class="col-lg-4 col-form-label  fw-bold fs-6">确认新密码</label>
                <!--end::Label-->
                <!--begin::Col-->
                <div class="col-lg-8 fv-row">
                  <input type="password" name="re_password"
                         class="form-control form-control-lg form-control-solid"
                         maxlength="256"
                         placeholder="不修改请留空" value=""/>
                </div>
                <!--end::Col-->
              </div>
              <!--end::Input group-->

              <!--begin::Input group 谷歌验证器-->
              <div class="row mb-6">
                <label class="col-lg-4 col-form-label fw-bold fs-6">谷歌验证器</label>
                <div class="col-lg-8 fv-row">
                  <span id="g2fa-status" class="text-muted me-2" role="status">正在读取绑定状态…</span>
                  <button type="button" id="g2fa-bind-btn" class="btn btn-sm btn-light-primary" style="display:none;"><i class="fa-duotone fa-regular fa-qrcode me-1"></i>绑定</button>
                  <button type="button" id="g2fa-unbind-btn" class="btn btn-sm btn-light-danger" style="display:none;"><i class="fa-duotone fa-regular fa-link-slash me-1"></i>解绑</button>
                  <button type="button" id="g2fa-retry-btn" class="btn btn-sm btn-light" style="display:none;"><i class="fa-duotone fa-regular fa-rotate me-1"></i>重试</button>
                </div>
              </div>
              <!--end::Input group 谷歌验证器-->


            </div>
            <!--end::Card body-->
            <!--begin::Actions-->
            <div class="card-footer d-flex justify-content-center py-6 px-9">
              <button type="button" class="btn btn-light-primary save-data" style="margin-right: 20px;"><i class="fa-duotone fa-regular fa-floppy-disk"></i> 确认修改</button>
              <a href="/admin/authentication/logout" class="btn btn-light-danger logout"><i class="fa-duotone fa-regular fa-right-from-bracket"></i> 注销登录</a>
            </div>
            <!--end::Actions-->
          </form>
          <!--end::Form-->
        </div>
        <!--end::Content-->
      </div>
      <!--end::Basic info-->

      <!--begin::Device sessions-->
      <div class="card mb-5 mb-xl-10 md-device-sessions" aria-labelledby="md-device-sessions-title">
        <div class="card-header border-0 pt-6">
          <div class="card-title d-flex flex-column align-items-start">
            <h2 id="md-device-sessions-title" class="fw-bolder mb-1">登录设备</h2>
            <span class="text-muted fs-7">每台设备独立登录，可随时退出不再使用的设备</span>
          </div>
          <div class="card-toolbar d-flex flex-wrap gap-2" data-admin-mobile-local-actions>
            <button type="button" class="btn btn-light-danger md-session-revoke-others">
              <i class="fa-duotone fa-regular fa-right-from-bracket"></i>退出其他设备
            </button>
            <button type="button" class="btn btn-danger md-session-revoke-all">
              <i class="fa-duotone fa-regular fa-shield-xmark"></i>退出全部设备
            </button>
          </div>
        </div>
        <div class="card-body pt-3">
          <div id="md-device-session-status" class="text-muted py-6 text-center" role="status">正在读取登录设备…</div>
          <div id="md-device-session-list" class="md-device-session-list" data-admin-mobile-local-actions aria-live="polite"></div>
          <button type="button" class="btn btn-light-primary md-session-retry mx-auto" style="display:none;">
            <i class="fa-duotone fa-regular fa-rotate"></i>重新读取
          </button>
        </div>
      </div>
      <!--end::Device sessions-->
    </div>
    <!--end::Container-->
  </div>
  <!--end::Post-->
</div>
<!--end::Content-->

#{ready("/assets/admin/controller/manage/set.js")}
#{ready("/assets/admin/controller/config/google2fa.js")}
#{include file="../Footer.html"}
