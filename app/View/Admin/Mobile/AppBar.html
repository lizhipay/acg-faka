<header class="admin-mobile-appbar" data-admin-mobile-appbar>
    <div class="admin-mobile-appbar__top">
        <div class="admin-mobile-appbar__heading">
            <strong data-admin-mobile-title>#{$title}</strong>
            <span class="admin-mobile-enterprise-badge" data-admin-mobile-enterprise hidden>企业版</span>
        </div>
        <button type="button" class="admin-mobile-icon-button" data-admin-mobile-appearance aria-label="外观模式" aria-haspopup="dialog" aria-expanded="false" aria-controls="admin-mobile-appearance-sheet">
            <span class="material-icons-outlined" aria-hidden="true">contrast</span>
        </button>
        <a class="admin-mobile-icon-button admin-mobile-store-button" data-admin-mobile-store href="/admin/store/home" aria-label="应用商店">
            <span class="material-icons-outlined" aria-hidden="true">storefront</span>
        </a>
    </div>
</header>
<nav class="admin-mobile-context-tabs" data-admin-mobile-context-tabs aria-label="当前功能导航" hidden></nav>
