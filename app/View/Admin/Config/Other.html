#{include file="../Header.html"}
<textarea id="md-config-substation-source" hidden aria-hidden="true">#{$config.substation_display_list|escape:'html'}</textarea>
<!--begin::Content-->
<div class="content d-flex flex-column flex-column-fluid" id="kt_content">
    <!--begin::Toolbar-->
    #{include file="../Toolbar.html"}
    <!--end::Toolbar-->
    <!--begin::Post-->
    <div class="post d-flex flex-column-fluid" id="kt_post">
        <!--begin::Container-->
        <div id="kt_content_container" class="container-xxl md-settings">
            <!--begin::Basic info-->
            <div class="card mb-5 mb-xl-10">
                <!--begin::Card header-->
                <div class="card-header border-0 cursor-pointer">
                    <!--begin::Card title-->
                    <div class="card-title m-0">
                        <h3 class="fw-bolder m-0">其他设置</h3>
                    </div>
                    <!--end::Card title-->
                </div>
                <!--begin::Card header-->
                <!--begin::Content-->
                <div id="kt_account_profile_details" class="collapse show">
                    <!--begin::Form-->
                    <form id="data-form" class="form" data-admin-mobile-settings-page="other">
                        <nav class="admin-mobile-settings-nav" aria-label="其他设置分区">
                            <a href="#mobile-other-domain">域名与主站</a>
                            <a href="#mobile-other-recharge">充值</a>
                            <a href="#mobile-other-support">客服</a>
                            <a href="#mobile-other-cash">提现</a>
                            <a href="#mobile-other-home">首页展示</a>
                        </nav>
                        <!--begin::Card body-->
                        <div class="card-body p-9">

                            <h2 class="admin-mobile-settings-section-title" id="mobile-other-domain"
                                data-admin-mobile-description="设置支付回调、主站域名、DNS 解析和主站商家展示。">域名与主站</h2>
                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label fw-bold fs-6">自定义支付回调域名(<a
                                            href="https://faka.wiki/#/zh-cn/setting-other" target="_blank" style="color: red;">详细教程</a>)</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <input type="text" name="callback_domain"
                                           inputmode="url"
                                           class="form-control form-control-lg form-control-solid"
                                           placeholder="自定义支付回调域名，需要带http://" value="#{$config.callback_domain|escape:'html'}"/>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label  fw-bold fs-6 required">主站域名配置(支持多域名,使用逗号分割)</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <textarea name="domain"
                                              inputmode="url"
                                              class="form-control form-control-lg form-control-solid"
                                              placeholder="多个域名使用逗号分割">#{$config.domain|escape:'html'}</textarea>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label required fw-bold fs-6">DNS-CNAME(域名解析)</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <input type="text" name="cname"
                                           inputmode="url"
                                           class="form-control form-control-lg form-control-solid"
                                           placeholder="CNAME域名" value="#{$config.cname|escape:'html'}"/>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label fw-bold fs-6 required">主站显示其他商家商品</label>
                                <!--begin::Label-->
                                <!--begin::Label-->
                                <div class="col-lg-8 d-flex align-items-center">
                                    <div class="form-check form-check-solid form-switch fv-row">
                                        <input class="form-check-input w-45px h-30px" type="checkbox"
                                               name="substation_display"
                                               value="1" #{if $config.substation_display == 1} checked #{/if}/>
                                        <label class="form-check-label"></label>
                                    </div>
                                </div>
                                <!--begin::Label-->
                            </div>
                            <!--end::Input group-->


                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label fw-bold fs-6">你想要显示那些供货商到主站</label>
                                <!--begin::Label-->
                                <!--begin::Label-->
                                <div class="col-lg-8 d-flex align-items-center">
                                    <table id="substation_display_list"></table>
                                </div>
                                <!--begin::Label-->
                            </div>
                            <!--end::Input group-->


                            <h2 class="admin-mobile-settings-section-title" id="mobile-other-recharge"
                                data-admin-mobile-description="设置单次充值金额范围和充值赠送规则。">充值</h2>
                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label required fw-bold fs-6">单次最低充值金额</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <input type="text" name="recharge_min"
                                           inputmode="decimal"
                                           pattern="(?:0|[1-9][0-9]{0,8})(?:\.[0-9]{1,2})?"
                                           class="form-control form-control-lg form-control-solid"
                                           placeholder="单次最低充值金额，0代表不限制，默认10元" value="#{$config.recharge_min|escape:'html'}"/>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label required fw-bold fs-6">单次最高充值金额</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <input type="text" name="recharge_max"
                                           inputmode="decimal"
                                           pattern="(?:0|[1-9][0-9]{0,8})(?:\.[0-9]{1,2})?"
                                           class="form-control form-control-lg form-control-solid"
                                           placeholder="单次最高充值金额，0代表不限制" value="#{$config.recharge_max|escape:'html'}"/>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label fw-bold fs-6">充值赠送</label>
                                <!--begin::Label-->
                                <!--begin::Label-->
                                <div class="col-lg-8 d-flex align-items-center">
                                    <div class="form-check form-check-solid form-switch fv-row">
                                        <input class="form-check-input w-45px h-30px" type="checkbox"
                                               name="recharge_welfare" value="1" #{if $config.recharge_welfare== 1}
                                        checked #{/if}/>
                                        <label class="form-check-label"></label>
                                    </div>
                                </div>
                                <!--begin::Label-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label  fw-bold fs-6">充值赠送配置</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <textarea name="recharge_welfare_config" style="height: 100px;"
                                              class="form-control form-control-lg form-control-solid"
                                              placeholder="配置规则：假如充值100元赠送5元的情况下：
100-5
一行一个规则。">#{$config.recharge_welfare_config|escape:'html'}</textarea>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <h2 class="admin-mobile-settings-section-title" id="mobile-other-support"
                                data-admin-mobile-description="设置主站客服 QQ 和网页客服地址。">客服</h2>
                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label  fw-bold fs-6">客服QQ(主站)</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <input type="text" name="service_qq"
                                           inputmode="numeric"
                                           class="form-control form-control-lg form-control-solid"
                                           placeholder="客服QQ" value="#{$config.service_qq|escape:'html'}"/>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->
                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label  fw-bold fs-6">网页客服地址(主站)</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <input type="text" name="service_url"
                                           inputmode="url"
                                           class="form-control form-control-lg form-control-solid"
                                           placeholder="网页客服地址" value="#{$config.service_url|escape:'html'}"/>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <h2 class="admin-mobile-settings-section-title" id="mobile-other-cash"
                                data-admin-mobile-description="设置可用提现方式、单笔手续费和最低提现金额。">提现</h2>
                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label required fw-bold fs-6">提现方式</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <!--begin::Options-->
                                    <div class="d-flex align-items-center mt-3">
                                        <!--begin::Option-->
                                        <label class="form-check form-check-inline form-check-solid me-5">
                                            <input class="form-check-input" name="cash_type_alipay" type="checkbox"
                                                   value="1" #{if $config.cash_type_alipay == 1} checked #{/if}>
                                            <span class="fw-bold ps-2 fs-6">支付宝</span>
                                        </label>
                                        <!--end::Option-->
                                        <!--begin::Option-->
                                        <label class="form-check form-check-inline form-check-solid me-5">
                                            <input class="form-check-input" name="cash_type_wechat" type="checkbox"
                                                   value="1" #{if $config.cash_type_wechat == 1} checked #{/if}>
                                            <span class="fw-bold ps-2 fs-6">微信</span>
                                        </label>
                                        <!--end::Option-->
                                        <!--begin::Option-->
                                        <label class="form-check form-check-inline form-check-solid me-5">
                                            <input class="form-check-input" name="cash_type_usdt" type="checkbox"
                                                   value="1" #{if $config.cash_type_usdt == 1} checked #{/if}>
                                            <span class="fw-bold ps-2 fs-6">USDT(TRC20)</span>
                                        </label>
                                        <!--end::Option-->
                                        <!--begin::Option-->
                                        <label class="form-check form-check-inline form-check-solid me-5">
                                            <input class="form-check-input" name="cash_type_balance" type="checkbox"
                                                   value="1" #{if $config.cash_type_balance == 1} checked #{/if}>
                                            <span class="fw-bold ps-2 fs-6">钱包余额</span>
                                        </label>
                                        <!--end::Option-->
                                    </div>
                                    <!--end::Options-->
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label required fw-bold fs-6">提现手续费(单笔固定)</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <input type="text" name="cash_cost"
                                           inputmode="decimal"
                                           pattern="(?:0|[1-9][0-9]{0,8})(?:\.[0-9]{1,2})?"
                                           class="form-control form-control-lg form-control-solid"
                                           placeholder="提现手续费" value="#{$config.cash_cost|escape:'html'}"/>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->
                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label required  fw-bold fs-6">最低提现金额</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <input type="text" name="cash_min"
                                           inputmode="decimal"
                                           pattern="(?:0|[1-9][0-9]{0,8})(?:\.[0-9]{1,2})?"
                                           class="form-control form-control-lg form-control-solid"
                                           placeholder="最低提现金额" value="#{$config.cash_min|escape:'html'}"/>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <h2 class="admin-mobile-settings-section-title" id="mobile-other-home"
                                data-admin-mobile-description="设置默认展开分类、首页商品推荐和推荐分类名称。">首页展示</h2>
                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label fw-bold fs-6">默认展开分类</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <!--begin::Input-->
                                    <select name="default_category" class="form-select form-select-solid form-select-lg"
                                            data-control="select2" data-hide-search="true">
                                        <option value="0" #{if $config.default_category == 0} selected #{/if}>不展开
                                        </option>
                                        <option value="recommend" #{if $config.default_category == "recommend"} selected #{/if}>推荐
                                        </option>
                                        #{foreach $category as $cate}
                                            <option value="#{$cate.id|escape:'html'}" #{if $config.default_category == $cate.id} selected #{/if}>#{$cate.name|escape:'html'}</option>
                                        #{/foreach}
                                    </select>
                                    <!--end::Input-->
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label fw-bold fs-6">首页商品推荐</label>
                                <!--begin::Label-->
                                <!--begin::Label-->
                                <div class="col-lg-8 d-flex align-items-center">
                                    <div class="form-check form-check-solid form-switch fv-row">
                                        <input class="form-check-input w-45px h-30px" type="checkbox"
                                               name="commodity_recommend"
                                               value="1" #{if $config.commodity_recommend == 1} checked #{/if}/>
                                        <label class="form-check-label"></label>
                                    </div>
                                </div>
                                <!--begin::Label-->
                            </div>
                            <!--end::Input group-->

                            <!--begin::Input group-->
                            <div class="row mb-6">
                                <!--begin::Label-->
                                <label class="col-lg-4 col-form-label  fw-bold fs-6">推荐分类名称</label>
                                <!--end::Label-->
                                <!--begin::Col-->
                                <div class="col-lg-8 fv-row">
                                    <textarea class="form-control form-control-lg form-control-solid"   name="commodity_name" placeholder="首页推荐分类名称"   rows="1">#{$config.commodity_name|escape:'html'}</textarea>
                                </div>
                                <!--end::Col-->
                            </div>
                            <!--end::Input group-->

                        </div>
                        <!--end::Card body-->
                        <!--begin::Actions-->
                        <div class="card-footer d-flex justify-content-center py-6 px-9">
                            <button type="button" class="btn btn-primary save-data"><i class="fa-duotone fa-regular fa-floppy-disk me-2"></i>保存设置</button>
                        </div>
                        <!--end::Actions-->
                    </form>
                    <!--end::Form-->
                </div>
                <!--end::Content-->
            </div>
            <!--end::Basic info-->
        </div>
        <!--end::Container-->
    </div>
    <!--end::Post-->
</div>
<!--end::Content-->

#{ready("/assets/admin/controller/config/other.js")}
#{include file="../Footer.html"}
