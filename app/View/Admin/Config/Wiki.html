<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wiki - #{$pluginName}</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link href="/assets/common/js/docsify/lib/themes/vue.css" rel="stylesheet">

    <style>
        .app-name .app-name-link img {
            height: 50px;
            border-radius: 10px;
        }

        .app-name .app-name-link {
            pointer-events: none;
            cursor: default;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // docsify 默认以“静态文件”方式拉 /app/Plugin/X/Wiki/*.md,而宝塔等 nginx 安全规则会把
    // README.md / CHANGELOG.md 等文件名 `return 404`,导致文档整体加载失败(部分用户 404 的根因)。
    // 这里把这类请求改写到 PHP 路由 /admin/plugin/wikiRes(走 index.php),URL 路径不以 README.md
    // 结尾、不被安全规则命中,任意服务器均可加载。docsify 的 basePath / 相对链接解析保持不变,只改变
    // 实际网络请求的目标 URL。
    (function () {
        var RE = /\/app\/Plugin\/([A-Za-z0-9_]+)\/Wiki\/([^?#]+)/;
        function rewrite(url) {
            var m = String(url).match(RE);
            return m ? ('/admin/plugin/wikiRes?plugin=' + encodeURIComponent(m[1]) + '&file=' + encodeURIComponent(m[2])) : url;
        }
        if (window.fetch) {
            var _fetch = window.fetch;
            window.fetch = function (input, init) {
                if (typeof input === 'string') { input = rewrite(input); }
                else if (input && input.url) { input = new Request(rewrite(input.url), input); }
                return _fetch.call(this, input, init);
            };
        }
        var _open = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function (method, url) {
            if (arguments.length > 1) { arguments[1] = rewrite(url); }
            return _open.apply(this, arguments);
        };
    })();
    window.$docsify = {
        basePath: "#{$basePath}",
        name: 'WIKI - #{$pluginName}',
        repo: '',
        homepage: '#{$homepage}',
        loadSidebar: true,
        loadNavbar: false,
        fallbackLanguages: ['zh-cn'],
        mergeNavbar: true,
        themeColor: '#3F51B5',
        logo: '#{$icon}',
        auto2top: true,
        subMaxLevel: 4,
        topMargin: 20,
        search: {
            depth: 6,
            noData: {
                '/': '没有找到结果!',
            },
            paths: 'auto',
            placeholder: {
                '/': '输入关键词搜索',
            }
        },
        alias: {
            '/_sidebar.md': '#{$sidebar}'
        }
    }
</script>
<script src="/assets/common/js/docsify/lib/docsify.min.js"></script>
<script src="/assets/common/js/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
